<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bento Grid - KASPRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#f2f2f7] text-black">
  <!-- Top Navbar -->
  <header class="flex justify-between items-center px-10 py-6 max-w-6xl mx-auto">
    <div class="font-bold text-2xl tracking-tighter">KASPRO</div>
    <div class="flex items-center gap-4">
      <div class="text-sm font-medium text-gray-500">Admin</div>
      <div class="w-10 h-10 bg-black rounded-full text-white flex items-center justify-center font-bold">A</div>
    </div>
  </header>

  <!-- Main Bento Grid -->
  <main class="max-w-6xl mx-auto px-10 pb-12">
    <div class="grid grid-cols-4 gap-6 auto-rows-[160px]">
      <!-- Balance Card (Large) -->
      <div class="col-span-2 row-span-2 bg-white rounded-[32px] p-8 shadow-sm flex flex-col justify-between hover:scale-[1.02] transition-transform">
        <div>
          <h2 class="text-gray-500 font-medium">Total Saldo Tersedia</h2>
          <div class="text-5xl font-bold mt-2">Rp 45.000.000</div>
        </div>
        <div class="flex gap-4 mt-auto">
          <button class="bg-black text-white px-6 py-3 rounded-full font-medium hover:bg-gray-800 transition">Tambah Dana</button>
          <button class="bg-gray-100 text-black px-6 py-3 rounded-full font-medium hover:bg-gray-200 transition">Tarik Dana</button>
        </div>
      </div>

      <!-- Menu 1 -->
      <div class="col-span-1 row-span-1 bg-blue-500 rounded-[32px] p-6 text-white flex flex-col justify-between hover:scale-[1.05] transition-transform cursor-pointer shadow-lg shadow-blue-500/30">
        <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center mb-2">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <div class="font-bold text-lg leading-tight">Kelola<br>Anggaran</div>
      </div>

      <!-- Menu 2 -->
      <div class="col-span-1 row-span-1 bg-purple-500 rounded-[32px] p-6 text-white flex flex-col justify-between hover:scale-[1.05] transition-transform cursor-pointer shadow-lg shadow-purple-500/30">
        <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center mb-2">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
        </div>
        <div class="font-bold text-lg leading-tight">Program<br>Kerja</div>
      </div>

      <!-- Stats -->
      <div class="col-span-2 row-span-1 bg-white rounded-[32px] p-6 shadow-sm flex items-center justify-around">
        <div class="text-center">
          <div class="text-3xl font-bold text-red-500">Rp 12.5M</div>
          <div class="text-sm text-gray-500">Pengeluaran</div>
        </div>
        <div class="w-px h-16 bg-gray-100"></div>
        <div class="text-center">
          <div class="text-3xl font-bold">8</div>
          <div class="text-sm text-gray-500">Proker Aktif</div>
        </div>
      </div>

      <!-- Recent Transactions -->
      <div class="col-span-4 row-span-2 bg-white rounded-[32px] p-8 shadow-sm">
        <h2 class="text-xl font-bold mb-6">Transaksi Terkini</h2>
        <div class="space-y-4">
          <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-xl shadow-sm">🛒</div>
              <div>
                <div class="font-bold">Pembelian Alat Tulis</div>
                <div class="text-sm text-gray-500">Divisi Humas</div>
              </div>
            </div>
            <div class="font-bold text-red-500">- Rp 450.000</div>
          </div>
          <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-xl shadow-sm">🎓</div>
              <div>
                <div class="font-bold">Pencairan Dana Proker A</div>
                <div class="text-sm text-gray-500">Divisi Pendidikan</div>
              </div>
            </div>
            <div class="font-bold text-red-500">- Rp 2.500.000</div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
