<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism - KASPRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Outfit', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-white overflow-hidden relative h-screen">
  <!-- Background Blobs -->
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/40 rounded-full blur-[100px]"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/40 rounded-full blur-[100px]"></div>
  <div class="absolute top-[30%] left-[40%] w-[30%] h-[30%] bg-teal-500/30 rounded-full blur-[100px]"></div>

  <div class="relative z-10 flex h-full backdrop-blur-3xl bg-black/10">
    <!-- Sidebar -->
    <aside class="w-64 border-r border-white/10 p-6 flex flex-col bg-white/5 backdrop-blur-md">
      <div class="font-bold text-2xl bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400 mb-8">KASPRO</div>
      <nav class="flex-1 space-y-3">
        <a href="#" class="block px-4 py-2.5 bg-white/10 rounded-xl text-sm font-medium border border-white/10 shadow-[0_4px_30px_rgba(0,0,0,0.1)]">Dashboard</a>
        <a href="#" class="block px-4 py-2.5 text-gray-300 hover:bg-white/5 rounded-xl text-sm transition">Anggaran</a>
        <a href="#" class="block px-4 py-2.5 text-gray-300 hover:bg-white/5 rounded-xl text-sm transition">Program Kerja</a>
        <a href="#" class="block px-4 py-2.5 text-gray-300 hover:bg-white/5 rounded-xl text-sm transition">Laporan</a>
      </nav>
    </aside>
    <!-- Main Content -->
    <main class="flex-1 p-8 overflow-y-auto">
      <header class="flex justify-between items-center mb-10">
        <h1 class="text-3xl font-semibold">Overview</h1>
        <button class="bg-gradient-to-r from-blue-500 to-purple-600 px-6 py-2.5 rounded-xl font-medium shadow-lg shadow-purple-500/30 hover:shadow-purple-500/50 transition">Tambah Transaksi</button>
      </header>
      <!-- Stats -->
      <div class="grid grid-cols-3 gap-6 mb-8">
        <div class="bg-white/10 backdrop-blur-xl p-6 rounded-2xl border border-white/20 shadow-[0_8px_32px_rgba(0,0,0,0.2)]">
          <div class="text-sm text-blue-200 mb-1">Total Saldo</div>
          <div class="text-3xl font-bold">Rp 45.000.000</div>
        </div>
        <div class="bg-white/10 backdrop-blur-xl p-6 rounded-2xl border border-white/20 shadow-[0_8px_32px_rgba(0,0,0,0.2)]">
          <div class="text-sm text-purple-200 mb-1">Pengeluaran Bulan Ini</div>
          <div class="text-3xl font-bold text-pink-400">Rp 12.500.000</div>
        </div>
        <div class="bg-white/10 backdrop-blur-xl p-6 rounded-2xl border border-white/20 shadow-[0_8px_32px_rgba(0,0,0,0.2)]">
          <div class="text-sm text-teal-200 mb-1">Proker Aktif</div>
          <div class="text-3xl font-bold">8 Program</div>
        </div>
      </div>
      <!-- Recent -->
      <div class="bg-white/5 backdrop-blur-xl rounded-2xl border border-white/10 overflow-hidden shadow-[0_8px_32px_rgba(0,0,0,0.2)]">
        <div class="px-6 py-4 border-b border-white/10 font-medium text-lg">Transaksi Terkini</div>
        <div class="p-6">
          <div class="flex justify-between items-center py-3 border-b border-white/5 last:border-0">
            <div>
              <div class="font-medium text-gray-100">Pembelian Alat Tulis</div>
              <div class="text-sm text-gray-400">Divisi Humas</div>
            </div>
            <div class="font-medium text-pink-400">- Rp 450.000</div>
          </div>
          <div class="flex justify-between items-center py-3 border-b border-white/5 last:border-0">
            <div>
              <div class="font-medium text-gray-100">Pencairan Dana Proker A</div>
              <div class="text-sm text-gray-400">Divisi Pendidikan</div>
            </div>
            <div class="font-medium text-pink-400">- Rp 2.500.000</div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
