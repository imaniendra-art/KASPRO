<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradient Mesh FinTech - KASPRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-black text-white min-h-screen relative overflow-x-hidden">
  <!-- Complex Mesh Background -->
  <div class="fixed inset-0 z-0">
    <div class="absolute top-[-20%] left-[-10%] w-[70%] h-[70%] bg-rose-500/40 rounded-full blur-[120px] mix-blend-screen"></div>
    <div class="absolute top-[20%] right-[-20%] w-[60%] h-[60%] bg-blue-600/40 rounded-full blur-[120px] mix-blend-screen"></div>
    <div class="absolute bottom-[-20%] left-[20%] w-[80%] h-[80%] bg-violet-600/30 rounded-full blur-[150px] mix-blend-screen"></div>
  </div>

  <div class="relative z-10 max-w-5xl mx-auto px-6 py-10">
    <header class="flex justify-between items-center mb-16">
      <div class="font-extrabold text-2xl tracking-widest text-white/90">KASPRO</div>
      <div class="w-12 h-12 rounded-full border-2 border-white/20 overflow-hidden backdrop-blur-md">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Admin" alt="Profile" class="w-full h-full object-cover bg-white/10">
      </div>
    </header>

    <div class="text-center mb-16">
      <h1 class="text-white/60 font-semibold mb-2 text-lg">Total Saldo</h1>
      <div class="text-7xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-b from-white to-white/50">Rp 45.000.000</div>
    </div>

    <!-- The 2 Menus -->
    <div class="grid grid-cols-2 gap-6 mb-16">
      <div class="group bg-white/10 backdrop-blur-2xl border border-white/20 p-8 rounded-[2rem] hover:bg-white/20 transition-all cursor-pointer">
        <div class="w-14 h-14 bg-gradient-to-br from-rose-400 to-orange-400 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <h2 class="text-2xl font-bold mb-2">Kelola Anggaran</h2>
        <p class="text-white/60">Catat pemasukan dan pengeluaran</p>
      </div>
      
      <div class="group bg-white/10 backdrop-blur-2xl border border-white/20 p-8 rounded-[2rem] hover:bg-white/20 transition-all cursor-pointer">
        <div class="w-14 h-14 bg-gradient-to-br from-blue-400 to-violet-400 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
        </div>
        <h2 class="text-2xl font-bold mb-2">Program Kerja</h2>
        <p class="text-white/60">Pantau progres dan dana proker</p>
      </div>
    </div>

    <!-- Recent List -->
    <div class="bg-black/40 backdrop-blur-3xl border border-white/10 rounded-[2rem] p-8">
      <h3 class="text-xl font-bold mb-6">Aktivitas Terkini</h3>
      <div class="space-y-4">
        <div class="flex justify-between items-center">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center border border-white/10 text-xl">🛒</div>
            <div>
              <div class="font-bold">Alat Tulis</div>
              <div class="text-sm text-white/50">Humas</div>
            </div>
          </div>
          <div class="font-bold text-rose-400">- Rp 450.000</div>
        </div>
        <div class="h-px bg-white/10 w-full"></div>
        <div class="flex justify-between items-center">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center border border-white/10 text-xl">🎓</div>
            <div>
              <div class="font-bold">Dana Proker A</div>
              <div class="text-sm text-white/50">Pendidikan</div>
            </div>
          </div>
          <div class="font-bold text-rose-400">- Rp 2.500.000</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
