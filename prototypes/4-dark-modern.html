<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Modern - KASPRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Roboto', sans-serif; }</style>
</head>
<body class="bg-[#050505] text-gray-300">
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-[#0a0a0a] border-r border-[#1a1a1a] p-6 flex flex-col">
      <div class="font-bold text-2xl text-white mb-8 tracking-wide">KASPRO.</div>
      <nav class="flex-1 space-y-1">
        <a href="#" class="block px-4 py-2.5 bg-[#141414] text-white rounded-lg text-sm font-medium border border-[#222]">Dashboard</a>
        <a href="#" class="block px-4 py-2.5 hover:text-white hover:bg-[#111] rounded-lg text-sm transition">Anggaran</a>
        <a href="#" class="block px-4 py-2.5 hover:text-white hover:bg-[#111] rounded-lg text-sm transition">Program Kerja</a>
        <a href="#" class="block px-4 py-2.5 hover:text-white hover:bg-[#111] rounded-lg text-sm transition">Laporan</a>
      </nav>
    </aside>
    <!-- Main Content -->
    <main class="flex-1 p-8 overflow-y-auto">
      <header class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-medium text-white">Overview</h1>
        <button class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-lg text-sm font-medium transition">Tambah Transaksi</button>
      </header>
      <!-- Stats -->
      <div class="grid grid-cols-3 gap-6 mb-8">
        <div class="bg-[#0a0a0a] p-6 rounded-2xl border border-[#1a1a1a] hover:border-[#333] transition-colors">
          <div class="text-sm text-gray-500 mb-2">Total Saldo</div>
          <div class="text-3xl font-bold text-white">Rp 45.000.000</div>
        </div>
        <div class="bg-[#0a0a0a] p-6 rounded-2xl border border-[#1a1a1a] hover:border-[#333] transition-colors">
          <div class="text-sm text-gray-500 mb-2">Pengeluaran Bulan Ini</div>
          <div class="text-3xl font-bold text-red-400">Rp 12.500.000</div>
        </div>
        <div class="bg-[#0a0a0a] p-6 rounded-2xl border border-[#1a1a1a] hover:border-[#333] transition-colors">
          <div class="text-sm text-gray-500 mb-2">Proker Aktif</div>
          <div class="text-3xl font-bold text-white">8 Program</div>
        </div>
      </div>
      <!-- Recent -->
      <div class="bg-[#0a0a0a] rounded-2xl border border-[#1a1a1a] overflow-hidden">
        <div class="px-6 py-4 border-b border-[#1a1a1a] font-medium text-white">Transaksi Terkini</div>
        <div class="p-6">
          <div class="flex justify-between items-center py-3 border-b border-[#1a1a1a] last:border-0">
            <div>
              <div class="font-medium text-white">Pembelian Alat Tulis</div>
              <div class="text-sm text-gray-500">Divisi Humas</div>
            </div>
            <div class="font-medium text-red-400">- Rp 450.000</div>
          </div>
          <div class="flex justify-between items-center py-3 border-b border-[#1a1a1a] last:border-0">
            <div>
              <div class="font-medium text-white">Pencairan Dana Proker A</div>
              <div class="text-sm text-gray-500">Divisi Pendidikan</div>
            </div>
            <div class="font-medium text-red-400">- Rp 2.500.000</div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
