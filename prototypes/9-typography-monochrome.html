<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Monochrome - KASPRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;700;900&display=swap" rel="stylesheet">
  <style>body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }</style>
</head>
<body class="bg-white text-black min-h-screen border-[12px] border-black m-4 relative flex flex-col">
  <header class="border-b-[4px] border-black px-8 py-6 flex justify-between items-end">
    <div>
      <div class="text-xs font-bold uppercase tracking-widest mb-1">System</div>
      <div class="font-black text-4xl uppercase tracking-tighter leading-none">KASPRO</div>
    </div>
    <div class="text-xl font-bold">MENU / ADMIN</div>
  </header>

  <main class="grid grid-cols-1 md:grid-cols-2 divide-y-[4px] md:divide-y-0 md:divide-x-[4px] divide-black flex-1">
    <!-- Left Column: Balance & Stats -->
    <div class="p-8">
      <div class="mb-16">
        <div class="text-sm font-bold uppercase tracking-widest mb-4">Total Balance</div>
        <div class="text-7xl font-black tracking-tighter leading-none">RP45M</div>
      </div>

      <div class="grid grid-cols-2 gap-8 border-t-[4px] border-black pt-8">
        <div>
          <div class="text-sm font-bold uppercase tracking-widest mb-2">Pengeluaran</div>
          <div class="text-4xl font-black">12.5M</div>
        </div>
        <div>
          <div class="text-sm font-bold uppercase tracking-widest mb-2">Proker</div>
          <div class="text-4xl font-black">08</div>
        </div>
      </div>
    </div>

    <!-- Right Column: The 2 Menus -->
    <div class="flex flex-col">
      <a href="#" class="flex-1 p-8 border-b-[4px] border-black hover:bg-black hover:text-white transition-colors flex flex-col justify-end group">
        <div class="text-6xl mb-4 group-hover:translate-x-4 transition-transform">→</div>
        <div class="text-5xl font-black uppercase tracking-tighter">Anggaran</div>
        <div class="text-sm font-bold uppercase tracking-widest mt-2 opacity-50">Kelola Finansial</div>
      </a>
      <a href="#" class="flex-1 p-8 hover:bg-black hover:text-white transition-colors flex flex-col justify-end group">
        <div class="text-6xl mb-4 group-hover:translate-x-4 transition-transform">→</div>
        <div class="text-5xl font-black uppercase tracking-tighter">Program<br>Kerja</div>
        <div class="text-sm font-bold uppercase tracking-widest mt-2 opacity-50">Pantau Kegiatan</div>
      </a>
    </div>
  </main>

  <!-- Bottom ticker -->
  <div class="border-t-[4px] border-black overflow-hidden py-3 bg-[#e5ff00] text-black whitespace-nowrap mt-auto">
    <div class="font-bold uppercase tracking-widest text-sm inline-block animate-[marquee_20s_linear_infinite]">
      TRANSAKSI TERBARU: ALAT TULIS (-450K) • PENCAIRAN PROKER A (-2.5M) • PEMASUKAN DANA (+10M) • TRANSAKSI TERBARU: ALAT TULIS (-450K)
    </div>
  </div>
  <style>
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
  </style>
</body>
</html>
