<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soft Corporate - KASPRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>body { font-family: 'Nunito', sans-serif; }</style>
</head>
<body class="bg-indigo-50 text-slate-800">
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-white shadow-[4px_0_24px_rgba(0,0,0,0.02)] p-6 flex flex-col z-10">
      <div class="flex items-center gap-3 mb-10">
        <div class="w-8 h-8 rounded-lg bg-indigo-600 text-white flex items-center justify-center font-bold">K</div>
        <div class="font-extrabold text-xl text-indigo-950">KASPRO</div>
      </div>
      <nav class="flex-1 space-y-2">
        <a href="#" class="flex items-center px-4 py-3 bg-indigo-50 text-indigo-700 rounded-xl font-bold">Dashboard</a>
        <a href="#" class="flex items-center px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-indigo-600 rounded-xl font-semibold transition">Anggaran</a>
        <a href="#" class="flex items-center px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-indigo-600 rounded-xl font-semibold transition">Program Kerja</a>
        <a href="#" class="flex items-center px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-indigo-600 rounded-xl font-semibold transition">Laporan</a>
      </nav>
    </aside>
    <!-- Main Content -->
    <main class="flex-1 p-8 overflow-y-auto">
      <header class="flex justify-between items-center mb-8">
        <div>
          <h1 class="text-3xl font-extrabold text-slate-900">Dashboard</h1>
          <p class="text-slate-500 font-medium">Selamat datang kembali, Admin</p>
        </div>
        <button class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-indigo-200 transition-all">Tambah Transaksi</button>
      </header>
      <!-- Stats -->
      <div class="grid grid-cols-3 gap-6 mb-8">
        <div class="bg-white p-6 rounded-3xl shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-slate-100">
          <div class="text-slate-500 font-semibold mb-2 flex items-center gap-2">Total Saldo</div>
          <div class="text-3xl font-extrabold text-slate-900">Rp 45.000.000</div>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-slate-100">
          <div class="text-slate-500 font-semibold mb-2">Pengeluaran</div>
          <div class="text-3xl font-extrabold text-rose-500">Rp 12.500.000</div>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-slate-100">
          <div class="text-slate-500 font-semibold mb-2">Proker Aktif</div>
          <div class="text-3xl font-extrabold text-indigo-600">8 Program</div>
        </div>
      </div>
      <!-- Recent -->
      <div class="bg-white rounded-3xl shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-slate-100 p-6">
        <div class="font-bold text-lg text-slate-900 mb-4">Transaksi Terkini</div>
        <div class="space-y-4">
          <div class="flex justify-between items-center p-4 rounded-2xl bg-slate-50 hover:bg-slate-100 transition">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full bg-rose-100 text-rose-500 flex items-center justify-center font-bold">-</div>
              <div>
                <div class="font-bold text-slate-900">Pembelian Alat Tulis</div>
                <div class="text-sm font-semibold text-slate-500">Divisi Humas</div>
              </div>
            </div>
            <div class="font-bold text-rose-500">- Rp 450.000</div>
          </div>
          <div class="flex justify-between items-center p-4 rounded-2xl bg-slate-50 hover:bg-slate-100 transition">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full bg-rose-100 text-rose-500 flex items-center justify-center font-bold">-</div>
              <div>
                <div class="font-bold text-slate-900">Pencairan Dana Proker A</div>
                <div class="text-sm font-semibold text-slate-500">Divisi Pendidikan</div>
              </div>
            </div>
            <div class="font-bold text-rose-500">- Rp 2.500.000</div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
