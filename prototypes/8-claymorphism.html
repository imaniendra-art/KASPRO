<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claymorphism - KASPRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Quicksand', sans-serif; }
    .clay-card {
      background: #f0f3f8;
      border-radius: 32px;
      box-shadow: 20px 20px 40px #d1d5df, -20px -20px 40px #ffffff, inset 4px 4px 8px rgba(255, 255, 255, 0.8), inset -4px -4px 8px rgba(0, 0, 0, 0.05);
    }
    .clay-btn {
      background: #f0f3f8;
      border-radius: 20px;
      box-shadow: 8px 8px 16px #d1d5df, -8px -8px 16px #ffffff;
      transition: all 0.2s ease;
    }
    .clay-btn:active {
      box-shadow: inset 8px 8px 16px #d1d5df, inset -8px -8px 16px #ffffff;
    }
    .clay-blue {
      background: #60a5fa;
      box-shadow: 10px 10px 20px #93c5fd, -10px -10px 20px #3b82f6, inset 4px 4px 8px rgba(255,255,255,0.4), inset -4px -4px 8px rgba(0,0,0,0.1);
      color: white;
    }
    .clay-pink {
      background: #f472b6;
      box-shadow: 10px 10px 20px #fbcfe8, -10px -10px 20px #ec4899, inset 4px 4px 8px rgba(255,255,255,0.4), inset -4px -4px 8px rgba(0,0,0,0.1);
      color: white;
    }
  </style>
</head>
<body class="bg-[#f0f3f8] text-gray-700 min-h-screen">
  <div class="max-w-4xl mx-auto px-6 py-12">
    <!-- Header -->
    <header class="flex justify-between items-center mb-12">
      <div class="font-bold text-3xl text-gray-800 tracking-tight">KASPRO</div>
      <div class="clay-btn px-6 py-3 font-bold text-gray-600 cursor-pointer">Admin Profile</div>
    </header>

    <!-- Balance -->
    <div class="clay-card p-10 text-center mb-12 relative overflow-hidden">
      <h2 class="text-xl font-bold text-gray-500 mb-2">Total Saldo Kas</h2>
      <div class="text-6xl font-bold text-gray-800">Rp 45.000.000</div>
    </div>

    <!-- The 2 Menus -->
    <div class="grid grid-cols-2 gap-8 mb-12">
      <div class="clay-blue p-8 rounded-[32px] cursor-pointer transform hover:-translate-y-2 transition-transform duration-300">
        <div class="text-4xl mb-4">💰</div>
        <h2 class="text-3xl font-bold mb-2">Anggaran</h2>
        <p class="font-medium opacity-90">Kelola uang masuk & keluar</p>
      </div>
      
      <div class="clay-pink p-8 rounded-[32px] cursor-pointer transform hover:-translate-y-2 transition-transform duration-300">
        <div class="text-4xl mb-4">📋</div>
        <h2 class="text-3xl font-bold mb-2">Proker</h2>
        <p class="font-medium opacity-90">Pantau program kerja divisi</p>
      </div>
    </div>

    <!-- Recent -->
    <div class="clay-card p-8">
      <h3 class="text-2xl font-bold text-gray-800 mb-6">Transaksi Terakhir</h3>
      <div class="space-y-6">
        <div class="flex justify-between items-center">
          <div class="flex items-center gap-4">
            <div class="clay-btn w-12 h-12 flex items-center justify-center font-bold text-xl text-pink-500">-</div>
            <div>
              <div class="font-bold text-lg text-gray-800">Alat Tulis Kantor</div>
              <div class="text-gray-500 font-medium">Humas</div>
            </div>
          </div>
          <div class="font-bold text-xl text-pink-500">Rp 450.000</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
